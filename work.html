    <title>MY Work</title>
    <style>
        .work {
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      height: 300px;
      margin-bottom: 2rem;
    }

    .work img {
      width: 100%;
      border-radius: 10px;
      display: block;
      transition: transform 0.5s;
    }

    .layer {
      width: 100%;
      height: 0%;
      background: linear-gradient(rgba(0, 0, 00.6), #ff004f);
      border-radius: 20px;
      position: absolute;
      left: 0;
      bottom: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 0 40px;
      text-align: center;
      font-size: 17px;
      transition: height 0.5s;
    }

    .layer h3 {
      font-weight: 700;
      margin-bottom: 20px;
    }
    img{
        height: 100%;
    }

    .layer a {
      margin-top: 20px;
      color: #ff004f;
      text-decoration: none;
      font-size: 18px;
      line-height: 60px;
      background: #fff;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      text-align: center;
    }

    .work:hover img {
      transform: scale(1.1);
    }

    .work:hover .layer {
      height: 100%;
    }
    .class{
        font-size: 40px;
        font-family: 'Courier New', Courier, monospace;
        color: aliceblue;
        font-weight: bolder;
        border: 5px double black;
        background: url(wallpaper-967837_1280.jpg);
    }
